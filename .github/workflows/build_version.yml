name: Build Version Specific OCI Image
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'qBittorrent release version tag (e.g. 5.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Pure build: override the qbittorrent-src input to the requested release tag.
      # Nix locks the override (narHash) at eval time, so no --impure is needed and
      # the build stays fully reproducible.
      - name: Build
        run: |
          nix build -L \
            --override-input qbittorrent-src "github:qbittorrent/qBittorrent/release-${{ inputs.version }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image name from Docker
        id: image_meta
        run: |
          IMAGE_NAME=$(docker load < result 2>&1 | grep "Loaded image:" | awk '{print $NF}')
          echo "local_image=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      # Publish only the version tag. This build is for a specific, possibly older
      # qBittorrent release, so it must NOT touch :latest (kept by build.yml) — the
      # two run in parallel.
      - name: Tag and Push Image
        run: |
          TARGET_IMAGE="ghcr.io/${{ github.repository }}"
          docker tag "${{ steps.image_meta.outputs.local_image }}" "${TARGET_IMAGE}:${{ inputs.version }}"
          docker push "${TARGET_IMAGE}:${{ inputs.version }}"
